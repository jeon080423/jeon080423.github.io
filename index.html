<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="naver-site-verification" content="9a238d4eb7b2f9a0ac63b4fe805376fbe4e7ab01" />
  <title>AHP Master</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
  <script>
    if (window.location.hostname === 'jeon080423.github.io') {
      window.location.href = "https://www.ahpmaster.com/";
    }
  </script>
</head>
<body>
  <iframe id="streamlit-app" src=""></iframe>
  <script>
    // Forward query parameters to the iframe src dynamically
    const queryParams = window.location.search;
    const baseSrc = "https://ahpkrj.streamlit.app/?embed=true";
    if (queryParams) {
      // Append query parameters with '&' since '?embed=true' already has '?'
      document.getElementById('streamlit-app').src = baseSrc + "&" + queryParams.substring(1);
    } else {
      document.getElementById('streamlit-app').src = baseSrc;
    }
  </script>
</body>
</html>
